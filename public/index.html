<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

    <title>Socket.IO chat</title>
  </head>

  <body>
    <ul id="messages"></ul>


    <form id="form" action="">
      <input id="handle" autocomplete="off" placeholder="Handle" />
      <input id="input" autocomplete="off" placeholder="Message" />
      <button>Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    
    <script>
      
        let counter = 0;
      const socket = io({
          auth: {
              serverOffset: 0
          },
          ackTimeout: 10000,
          retries: 3,
      });

      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const messages = document.getElementById('messages');

      form.addEventListener('submit', (e) => {
          e.preventDefault();
          if (input.value) {
              // compute unique offset
              const clientOffset = `${socket.id}-${counter++}`; // socket.id is a 20 char random id for each connection
              socket.emit('chat message', input.value, clientOffset);
              input.value = '';
          }
      });

      socket.on('chat message', (msg, serverOffset) => {
          const item = document.createElement('li');
          item.textContent = msg.text || msg; // get message or msg from backend

          if (msg.type === 'system') {
            item.style.fontStyle = 'italic';
            item.style.color = 'gray'; // You can make it gray, too!
          };
          document.getElementById('messages').appendChild(item);

          // Update offset
          window.scrollTo(0, document.body.scrollHeight);
          socket.auth.serverOffset = serverOffset;
          
      });

    </script>

  </body>
</html>
